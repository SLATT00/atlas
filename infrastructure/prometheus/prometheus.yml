global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8001']

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8002']

  - job_name: 'account-service'
    static_configs:
      - targets: ['account-service:8005']

  - job_name: 'ledger-service'
    static_configs:
      - targets: ['ledger-service:8006']

  - job_name: 'transfer-service'
    static_configs:
      - targets: ['transfer-service:8008']

  - job_name: 'exchange-service'
    static_configs:
      - targets: ['exchange-service:8009']

  - job_name: 'card-service'
    static_configs:
      - targets: ['card-service:8010']

  - job_name: 'wallet-service'
    static_configs:
      - targets: ['wallet-service:8011']

  - job_name: 'loan-service'
    static_configs:
      - targets: ['loan-service:8013']

  - job_name: 'savings-service'
    static_configs:
      - targets: ['savings-service:8014']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8015']
