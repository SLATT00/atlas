version: "3.9"

services:
  # ─── Infrastructure ───
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ─── Observability ───
  prometheus:
    image: prom/prometheus:v2.50.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:10.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "4317:4317"
      - "16686:16686"

  # ─── Backend Services ───
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: user-service
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  account-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: account-service
    ports:
      - "8005:8005"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  ledger-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: ledger-service
    ports:
      - "8006:8006"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  transfer-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: transfer-service
    ports:
      - "8008:8008"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  card-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: card-service
    ports:
      - "8010:8010"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  wallet-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: wallet-service
    ports:
      - "8011:8011"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  loan-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: loan-service
    ports:
      - "8013:8013"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  savings-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: savings-service
    ports:
      - "8014:8014"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: notification-service
    ports:
      - "8015:8015"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  # ─── Frontend ───
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  opensearch_data:
  minio_data:
  prometheus_data:
  grafana_data:
